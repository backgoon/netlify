name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Replace secrets in index.html
        run: |
          # index.html의 PLACEHOLDER를 금고(Secrets)의 진짜 값으로 교체합니다.
          sed -i "s/BDB_API_KEY_PLACEHOLDER/${{ secrets.BDB_API_KEY }}/g" index.html
          sed -i "s/BDB_AUTH_DOMAIN_PLACEHOLDER/${{ secrets.BDB_AUTH_DOMAIN }}/g" index.html
          sed -i "s/BDB_PROJECT_ID_PLACEHOLDER/${{ secrets.BDB_PROJECT_ID }}/g" index.html
          sed -i "s/BDB_STORAGE_BUCKET_PLACEHOLDER/${{ secrets.BDB_STORAGE_BUCKET }}/g" index.html
          sed -i "s/BDB_SENDER_ID_PLACEHOLDER/${{ secrets.BDB_SENDER_ID }}/g" index.html
          sed -i "s/BDB_APP_ID_PLACEHOLDER/${{ secrets.BDB_APP_ID }}/g" index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages # 중요: 결과물은 gh-pages 브랜치에 저장됨
          clean: true       # 기존 데이터 정리
