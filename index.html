<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3040 홀브 일정</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap');
    :root { --blue: #1a3a6d; --pink: #ff85a1; --soft-pink: #fff0f3; --today: #fffde7; --mint: #e0f2f1; --sat: #1e88e5; --sun: #e53935; }
    
    body { font-family: 'Nanum Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding: 10px; overflow-x: hidden; width: 100%; box-sizing: border-box; }
    .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(255,133,161,0.1); margin-bottom: 15px; border: 1px solid var(--soft-pink); }
    .year-area { display: flex; align-items: center; white-space: nowrap; font-size: 28px; font-weight: 800; color: var(--blue); }
    .today-btn { padding: 5px 12px; cursor: pointer; background: white; color: var(--pink); border: 2px solid var(--pink); border-radius: 20px; font-weight: bold; font-size: 14px; margin-left: 8px; }



    /* 달력 주말 색상 설정 */
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 100%; }
    .day-header { text-align: center; font-weight: bold; padding: 5px; color: var(--pink); font-size: 12px; }
    .day-header:nth-child(1) { color: var(--sun); } /* 일요일 헤더 */
    .day-header:nth-child(7) { color: var(--sat); } /* 토요일 헤더 */

    .day { min-height: 90px; background: white; border: 1px solid #ffeef1; border-radius: 6px; padding: 6px; cursor: pointer; position: relative; font-size: 13px; display: flex; flex-direction: column; }
    .day.today { border: 2px solid var(--pink); background: var(--today); }
    
    /* 날짜 숫자 색상 */
    .day .date-num { font-weight: bold; margin-bottom: 4px; }
    .day.sun .date-num { color: var(--sun); } /* 일요일 숫자 빨강 */
    .day.sat .date-num { color: var(--sat); } /* 토요일 숫자 파랑 */

@media (max-width: 768px) {
    /* ... 다른 모바일 설정들 ... */

    .event-tag {
        font-size: 8.5px;         /* 글자를 아주 살짝 더 줄여서 2글자가 한 줄에 쏙 들어가게 함 */
        width: 22px;              /* 폭을 22px로 줄여서 2글자 초과 시 무조건 줄바꿈 유도 */
        display: inline-block;
        white-space: normal;      /* 줄바꿈 허용 */
        word-break: break-all;    /* 글자 단위로 끊기 */
        line-height: 1.0;         /* 줄 간격을 붙여서 2x2가 하나의 덩어리로 보이게 함 */
        padding: 1px;
        margin: 1px;
        text-align: center;
        border-radius: 2px;
    }
}
        
.holiday-text {
    font-size: 10px;
    color: var(--sun);
    font-weight: bold;
    margin-bottom: 2px;
}


/* 메모장: 폰트를 나눔고딕으로 통일하여 커서 문제 해결 */
.memo-container { 
    position: relative; 
    background: #e0f2f1; 
    width: 450px; 
    height: 180px; 
    padding: 10px; 
    box-shadow: 5px 5px 15px rgba(0,0,0,0.1); 
    border-left: 10px solid #b2dfdb; 
    z-index: 100;
    cursor: text;
}

#memo-area { 
    width: 100%; 
    height: 100%; 
    background: transparent; 
    border: none; 
    /* 1. 폰트를 나눔고딕으로 하되, 아주 진하고 선명하게 설정 */
    font-family: 'Nanum Gothic', sans-serif; 
    font-size: 16px; 
    font-weight: 800; /* 숫자가 높을수록 글자가 두껍고 선명해집니다 */
    line-height: 1.8; 
    resize: none; 
    outline: none; 
    display: block; 
    color: #1a1a1a; /* 거의 검정에 가까운 색으로 선명도 강화 */
    
    /* 2. [만세!] 성공했던 빨간 커서 설정 유지 */
    caret-color: #ff0000 !important; 
    
    padding: 10px; 
    box-sizing: border-box; 
    overflow-y: auto;
    
    /* 3. 글자가 흐릿하게 뭉치는 현상 방지 */
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}
        
@media (max-width: 768px) {
    /* 1. 기본 상태: 우측 상단 동그란 아이콘 */
    .memo-container {
        position: fixed !important;
        top: 20px !important;
        right: 20px !important;
        width: 50px !important;
        height: 50px !important;
        border-radius: 50% !important;
        border: 3px solid #b2dfdb !important;
        padding: 0 !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        transform: none !important; /* 회전 제거 */
        box-shadow: 0 4px 10px rgba(0,0,0,0.2) !important;
    }

    /* 아이콘 표시 */
    .memo-container:not(.active)::before {
        content: '📝';
        font-size: 24px;
        display: block;
    }

    /* 아이콘일 때 글상자 숨김 */
    .memo-container:not(.active) #memo-area {
        display: none !important;
    }

    /* 2. 활성화 상태: 중앙 모달 형태 */
    .memo-container.active {
        border-radius: 15px !important;
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        width: 90% !important;
        height: 350px !important;
        
        /* [핵심] 오버레이(999)보다 높은 숫자를 줘야 선명하게 보입니다 */
        z-index: 1001 !important; padding: 15px !important;
        display: block !important;
        background: #e0f2f1 !important; /* 배경색을 확실히 지정 */
        box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important;
    }

    .memo-container.active::before {
        content: none !important; /* 아이콘 숨기기 */
    }

    .memo-container.active #memo-area {
        display: block !important; /* 글상자 보이기 */
    }

    /* 일정 태그 2x2 정렬 유지 */
    .event-tag {
        font-size: 8.5px;
        width: 22px;
        display: inline-block;
        white-space: normal;
        word-break: break-all;
        line-height: 1.0;
        padding: 1px;
        margin: 1px;
        text-align: center;
        border-radius: 2px;
    }
}

    /* 공휴일 설정 */
    .holiday-label {
        font-size: 10px;
        color: #e53935; /* 빨간색 */
        font-weight: bold;
        margin-bottom: 2px;
        display: block;
        background: transparent !important; /* 배경색 절대 없음 */
    }

/* 일요일 및 공휴일 숫자 빨간색 */
.day.sun .date-num { color: #e53935 !important; }
        
    /* 나머지 모달 등 기존 스타일 유지 */
    .nav-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
    .nav-btn { padding: 8px 16px; cursor: pointer; background: var(--pink); color: white; border: none; border-radius: 8px; font-weight: bold; }
    .calendar-card { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 8px 25px rgba(255,133,161,0.15); border: 2px solid var(--soft-pink); width: 100%; box-sizing: border-box; }
    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 1001; width: 280px; border: 3px solid var(--pink); }
    .add-btn { width: 100%; padding: 12px; background: var(--pink); color: white; border: none; border-radius: 10px; font-weight: bold; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); z-index: 999; }
</style>
</head>
<body>
    <div class="header">
        <div class="year-area">
            <span style="font-size: 28px; font-weight: 800; color: var(--blue);">
                <span id="display-year"></span>년
            </span>
            <button class="today-btn" onclick="goToToday()">오늘</button>
        </div>
        <div class="memo-container">
            <textarea id="memo-area" placeholder="메모를 입력하세요..."></textarea>
        </div>
    </div>

    <div class="nav-control">
        <button class="nav-btn" onclick="changeMonth(-1)">◀ 이전달</button>
        <span id="month-display" style="font-size: 20px; font-weight: bold; color: var(--blue);"></span>
        <button class="nav-btn" onclick="changeMonth(1)">다음달 ▶</button>
    </div>

    <div class="calendar-card">
        <div class="grid" id="calendar-grid"></div>
    </div>

    <div class="overlay" id="overlay"></div>
    <!-- <div class="modal" id="modal">
        <div style="margin-bottom: 15px;">
            <span id="modal-date-display" style="color: var(--pink); font-weight: bold; font-size: 1.1em;"></span>
            <span style="color: #666;"> 일정 추가</span>
        </div>
        <input type="text" id="event-input" placeholder="일정을 입력하세요" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
        <button class="add-btn" onclick="addEvent()">추가하기</button>
        <div id="modal-list" style="margin-top:15px; max-height:150px; overflow-y:auto;"></div>
    </div> -->

<div id="modal" class="modal">
    <h3 id="modal-date-display"></h3>
    <input type="text" id="event-input" placeholder="일정을 입력하세요">
    
    <div style="margin: 10px 0; font-size: 13px; display: flex; align-items: center; gap: 5px;">
        <input type="checkbox" id="is-holiday">
        <label for="is-holiday" style="color: var(--sun); font-weight: bold;">공휴일(빨간날)로 지정</label>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
        </div>
    <button class="add-btn" onclick="addEvent()">추가하기</button>
    <div id="modal-list" style="margin-top:15px; max-height:150px; overflow-y:auto;"></div>
    <button onclick="closeModal()" style="width:100%; margin-top:10px; border:none; background:#eee; padding:8px; border-radius:10px; cursor:pointer;">닫기</button>
</div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCjKNiwIuWn1-MhAgsIRz1C5FCa7NTy_5o",
    authDomain: "backgoon-811dc.firebaseapp.com",
    projectId: "backgoon-811dc",
    storageBucket: "backgoon-811dc.firebasestorage.app",
    messagingSenderId: "275172993103",
    appId: "1:275172993103:web:e001d6487f8429d736a23a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth();
let data = {}, selectedDate = "", selectedColor = "#ffdce0", memoTimer;

const memoArea = document.getElementById('memo-area');
const memoContainer = document.querySelector('.memo-container');
const overlay = document.getElementById('overlay');

// 실시간 감시 (async 처리 포함)
onSnapshot(doc(db, "planner", "data"), async (snap) => { 
    if (snap.exists()) { 
        data = snap.data(); 
        await renderCalendar(); 
    } 
});
onSnapshot(doc(db, "planner", "memo"), (snap) => {
    if (snap.exists() && document.activeElement !== memoArea) { 
        memoArea.value = snap.data().text; 
    }
});

// 공휴일 데이터 캐싱
let cachedHolidays = {};

async function fetchHolidays(year) {
    if (cachedHolidays[year]) return cachedHolidays[year];
    try {
        const response = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/KR`);
        const holidayData = await response.json();
        const holidayMap = {};
        holidayData.forEach(h => {
            const date = new Date(h.date);
            const key = `${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()}`;
            holidayMap[key] = h.localName;
        });
        cachedHolidays[year] = holidayMap;
        return holidayMap;
    } catch (e) {
        console.error("공휴일 로드 실패:", e);
        return {};
    }
}

// 달력 그리기 (중복 제거 및 async 통합)
window.renderCalendar = async function() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';
    document.getElementById('display-year').innerText = currentYear;
    document.getElementById('month-display').innerText = `${currentMonth + 1}월`;

    const holidays = await fetchHolidays(currentYear);
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();

    ['일','월','화','수','목','금','토'].forEach(d => grid.innerHTML += `<div class="day-header">${d}</div>`);
    for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="day"></div>`;

    for(let d=1; d<=lastDate; d++) {
        const dateStr = `${currentYear}-${currentMonth+1}-${d}`;
        const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
        
        // 1. API 공휴일 확인
        let holidayName = holidays[dateStr]; 
        
        // 2. 사용자가 수동 등록한 공휴일이 있는지 확인
        const userEvents = data[dateStr] || [];
        const userHoliday = userEvents.find(ev => ev.isHoliday);
        if (userHoliday) {
            holidayName = userHoliday.text; // 사용자 입력 텍스트를 휴일 이름으로 사용
        }

        let dayClass = "day";
        // 일요일이거나 (API 혹은 사용자 등록) 공휴일이면 빨간색
        if (dayOfWeek === 0 || holidayName) dayClass += " sun";
        if (dayOfWeek === 6) dayClass += " sat";
        // if (currentYear === new Date().getFullYear() && currentMonth === new Date().getMonth() && d === new Date().getDate()) {
        //     dayClass += " today";
        // }

        const holidayHtml = holidayName ? `<span class="holiday-label">${holidayName}</span>` : '';
        const tags = (data[dateStr] || []).map(ev => `<span class="event-tag" style="background:${ev.color};">${ev.text}</span>`).join('');
        
        grid.innerHTML += `
            <div class="${dayClass}" ondblclick="openModal('${dateStr}')">
                <span class="date-num">${d}</span>
                ${holidayHtml}
                <div>${tags}</div>
            </div>`;
    }
};

// 메모장 제어 로직
memoArea.addEventListener('input', (e) => {
    clearTimeout(memoTimer);
    memoTimer = setTimeout(async () => { 
        await setDoc(doc(db, "planner", "memo"), { text: e.target.value }); 
    }, 800);
});

memoContainer.addEventListener('click', (e) => {
    if (window.innerWidth <= 768) {
        if (!memoContainer.classList.contains('active')) {
            memoContainer.classList.add('active');
            overlay.style.display = 'block';
            memoArea.focus();
        }
    } else {
        memoArea.focus();
    }
});

overlay.addEventListener('click', () => {
    if (window.innerWidth <= 768) {
        memoContainer.classList.remove('active');
    }
    overlay.style.display = 'none';
    closeModal();
});

memoArea.addEventListener('click', (e) => {
    e.stopPropagation();
});

// 달력 조작 함수들 (await 추가)
window.changeMonth = async (v) => { 
    currentMonth += v; 
    if(currentMonth < 0){ currentMonth = 11; currentYear--; }
    else if(currentMonth > 11){ currentMonth = 0; currentYear++; } 
    await renderCalendar(); 
};

window.goToToday = async () => { 
    currentYear = new Date().getFullYear(); 
    currentMonth = new Date().getMonth(); 
    await renderCalendar(); 
};

// window.addEvent = async function() {
//     const input = document.getElementById('event-input');
//     if(!input.value) return;
//     if(!data[selectedDate]) data[selectedDate] = [];
//     data[selectedDate].push({ text: input.value, color: selectedColor });
//     await setDoc(doc(db, "planner", "data"), data);
//     input.value = '';
//     updateModalList();
//     await renderCalendar();
//     closeModal();
// };
window.addEvent = async function() {
    const input = document.getElementById('event-input');
    const isHoliday = document.getElementById('is-holiday').checked; // 체크박스 상태 확인
    
    if(!input.value) return;
    if(!data[selectedDate]) data[selectedDate] = [];
    
    // 데이터 구조에 isHoliday 추가
    data[selectedDate].push({ 
        text: input.value, 
        color: selectedColor,
        isHoliday: isHoliday 
    });
    
    await setDoc(doc(db, "planner", "data"), data);
    
    input.value = '';
    document.getElementById('is-holiday').checked = false; // 초기화
    updateModalList();
    await renderCalendar();
    closeModal();
};

window.deleteEvent = async (i) => {
    data[selectedDate].splice(i, 1);
    await setDoc(doc(db, "planner", "data"), data);
    updateModalList();
    await renderCalendar();
};

window.openModal = (d) => { 
    selectedDate = d; 
    const dateParts = d.split('-');
    document.getElementById('modal-date-display').innerText = `${dateParts[1]}월 ${dateParts[2]}일`;
    document.getElementById('modal').style.display='block'; 
    document.getElementById('overlay').style.display='block'; 
    updateModalList(); 
};

window.closeModal = () => { 
    document.getElementById('modal').style.display='none'; 
    document.getElementById('overlay').style.display='none'; 
};

window.updateModalList = () => {
    const div = document.getElementById('modal-list'); 
    div.innerHTML = '';
    (data[selectedDate] || []).forEach((ev, i) => {
        div.innerHTML += `<div style="display:flex;justify-content:space-between;background:${ev.color};padding:8px;margin-bottom:5px;border-radius:5px;font-size:13px;">${ev.text} <button onclick="deleteEvent(${i})" style="border:none;background:none;color:red;cursor:pointer;">×</button></div>`;
    });
};

// 초기 실행
renderCalendar();
    </script>
</body>
</html>
