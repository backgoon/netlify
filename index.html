<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3040 홀브 일정</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

    :root { 
        --blue: #1a3a6d; --pink: #ff85a1; --soft-pink: #fff0f3; --today: #fffde7; 
        --mint: #e0f2f1; --sat: #1e88e5; --sun: #e53935; 
    }
    
    body { font-family: 'Nanum Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding: 10px; overflow-x: hidden; width: 100%; box-sizing: border-box; }

    .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(255,133,161,0.1); margin-bottom: 15px; border: 1px solid var(--soft-pink); }
    .year-area { display: flex; align-items: center; white-space: nowrap; font-size: 28px; font-weight: 800; color: var(--blue); }
    .today-btn { padding: 5px 12px; cursor: pointer; background: white; color: var(--pink); border: 2px solid var(--pink); border-radius: 20px; font-weight: bold; font-size: 14px; margin-left: 8px; }

    .calendar-card { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 8px 25px rgba(255,133,161,0.15); border: 2px solid var(--soft-pink); width: 100%; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(100px, auto); gap: 4px; width: 100%; }

    .day-header { text-align: center; font-weight: bold; padding: 5px; color: var(--pink); font-size: 12px; }
    .day-header:nth-child(1) { color: var(--sun); }
    .day-header:nth-child(7) { color: var(--sat); }

    .day { min-height: 100px; background: white; border: 1px solid #ffeef1; border-radius: 6px; padding: 6px; cursor: pointer; position: relative; font-size: 13px; display: flex; flex-direction: column; height: auto; }
    .day.today { border: 2px solid var(--pink) !important; background: var(--today) !important; box-shadow: inset 0 0 5px rgba(255,133,161,0.3); }
    .day.today .date-num { background: var(--pink); color: white !important; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; }
    .day.sun .date-num, .day.sun .holiday-label { color: var(--sun) !important; }
    .day.sat .date-num { color: var(--sat); }
    .day .date-num { font-weight: bold; margin-bottom: 4px; }

    .holiday-label { font-size: 11px; font-weight: 800; display: block; margin-bottom: 3px; word-break: break-all; }
    .event-container { display: flex; flex-wrap: wrap; gap: 3px; width: 100%; padding: 2px; justify-content: flex-start; }

    .event-tag { display: inline-block; padding: 2px 4px; border-radius: 4px; font-size: 11px; color: #333; line-height: 1.4; max-width: 95%; word-break: break-all; white-space: normal; box-shadow: 0 1px 2px rgba(0,0,0,0.1); cursor: pointer; }

    .memo-container { position: relative; background: #e0f2f1; width: 450px; height: 180px; padding: 10px; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); border-left: 10px solid #b2dfdb; z-index: 100; cursor: text; }
    #memo-area { width: 100%; height: 100%; background: transparent; border: none; font-family: 'Nanum Gothic', sans-serif; font-size: 16px; font-weight: 800; line-height: 1.8; resize: none; outline: none; display: block; color: #1a1a1a; caret-color: #ff0000 !important; padding: 10px; box-sizing: border-box; overflow-y: auto; }

    .nav-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
    .nav-btn { padding: 8px 16px; cursor: pointer; background: var(--pink); color: white; border: none; border-radius: 8px; font-weight: bold; }
    
    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 1001; width: 280px; border: 3px solid var(--pink); }
    .add-btn { width: 100%; padding: 12px; background: var(--pink); color: white; border: none; border-radius: 10px; font-weight: bold; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); z-index: 999; }

    @media (max-width: 768px) {
        .memo-container { 
        position: fixed !important; 
        top: 20px !important; 
        right: 10px !important; /* [수정] 20px에서 10px로 변경하여 오른쪽으로 이동 */
        width: 50px !important; 
        height: 50px !important; 
        border-radius: 50% !important; 
        border: 3px solid #b2dfdb !important; 
        padding: 0 !important; 
        display: flex !important; 
        justify-content: center !important; 
        align-items: center !important; 
        background: #e0f2f1; /* 배경색 확인 */
        box-shadow: 0 4px 10px rgba(0,0,0,0.2); /* 떠 있는 느낌을 위해 그림자 추가 */
    }
        .memo-container:not(.active)::before { content: '📝'; font-size: 24px; }
        .memo-container:not(.active) #memo-area { display: none !important; }
        .memo-container.active { border-radius: 15px !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; width: 90% !important; height: 350px !important; z-index: 1001 !important; padding: 15px !important; }
        
        .grid { grid-template-columns: repeat(7, minmax(12.5%, 1fr)); gap: 1px; }
        /* [수정] 모바일 4글자 레이아웃 최적화 */
        .event-tag { font-size: 9px; letter-spacing: -1px; padding: 2px 1px; width: 100%; box-sizing: border-box; white-space: normal; word-break: break-all; line-height: 1.1; }
        .holiday-label { font-size: 9px; letter-spacing: -0.5px; }
        .day { min-height: 90px; padding: 3px; }
    }
#yearly-modal {
    display: none; 
    position: fixed; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); 
    background: white; 
    padding: 20px; 
    border-radius: 20px; 
    z-index: 1001; 
    border: 3px solid var(--blue); /* 연간 일정은 파란색 테두리로 구분 */
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.yearly-holiday-bold {
    color: #e53935 !important; /* 진한 빨간색 */
    font-weight: 800 !important; /* 아주 굵게 */
    margin-right: 2px;
}
    
</style>
</head>
<body>
    <div class="header">
        <div class="year-area">
            <span id="display-year"></span>년 
            <button class="today-btn" onclick="goToday()">오늘</button>
            <button class="today-btn" onclick="openYearlyView()" 
                    style="margin-left:5px; margin-right:15px; background:var(--blue); color:white; border-color:var(--blue);">
                연간 일정
            </button>
        </div>
        <div class="memo-container" onclick="toggleMemo(event)"><textarea id="memo-area" placeholder="메모를 입력하세요..."></textarea></div>
    </div>
    <div class="nav-control">
        <button class="nav-btn" onclick="changeMonth(-1)">◀ 이전달</button>
        <span id="month-display" style="font-size: 20px; font-weight: bold; color: var(--blue);"></span>
        <button class="nav-btn" onclick="changeMonth(1)">다음달 ▶</button>
    </div>
    <div class="calendar-card"><div class="grid" id="calendar-grid"></div></div>
    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <div id="modal" class="modal">
        <h3 id="modal-date-display" style="text-align: center; color: #333; margin-bottom: 20px;"></h3>
        <div style="font-size: 13px; color: #555; margin-bottom: 8px; font-weight: bold;">📅 등록된 일정</div>
        <div id="modal-list" style="margin-bottom:20px; max-height:180px; overflow-y:auto; border: 1px solid #ddd; padding: 10px; border-radius: 12px; background: #fafafa;"></div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="event-input" placeholder="일정 내용을 입력하세요" style="width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box;">
            <div style="display: flex; gap: 12px; justify-content: center; margin: 10px 0;">
                <div class="color-btn" onclick="selectColor('#ffdce0', this)" style="background:#ffdce0; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
                <div class="color-btn" onclick="selectColor('#e2f0cb', this)" style="background:#e2f0cb; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
                <div class="color-btn" onclick="selectColor('#c7ceea', this)" style="background:#c7ceea; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
                <div class="color-btn" onclick="selectColor('#f7d1ba', this)" style="background:#f7d1ba; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
            </div>
            <div style="display: flex; align-items: center; gap: 8px; background: #fff4f4; padding: 8px; border-radius: 8px;">
                <input type="checkbox" id="is-holiday" style="width:18px; height:18px;">
                <label for="is-holiday" style="color: #e53935; font-weight: bold; font-size: 13px;">이 일정을 공휴일(빨간날)로 지정</label>
            </div>
            <button class="add-btn" onclick="addEvent()" style="background: #333;">추가 / 수정 저장</button>
        </div>
        <button onclick="closeAll()" style="width:100%; margin-top:15px; border:none; background:transparent; color: #999; cursor:pointer;">취소하고 닫기</button>
    </div>
    <div id="yearly-modal" class="modal" style="width: 90%; max-width: 500px; height: 80vh; overflow: hidden; display: none; flex-direction: column;">
        <h2 style="text-align: center; color: var(--blue);">📅 <span id="yearly-title"></span>년 전체 일정</h2>
        <div id="yearly-list-container" style="flex: 1; overflow-y: auto; padding: 10px; background: #f9f9f9; border-radius: 10px;">
            </div>
        <button onclick="closeYearlyView()" style="width: 100%; padding: 15px; margin-top: 10px; border: none; background: var(--pink); color: white; border-radius: 10px; font-weight: bold; cursor: pointer;">닫기</button>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const bdbConfig = {
  apiKey: "AIzaSyCjKNiwIuWn1-MhAgsIRz1C5FCa7NTy_5o",
  authDomain: "backgoon-811dc.firebaseapp.com",
  projectId: "backgoon-811dc",
  storageBucket: "backgoon-811dc.firebasestorage.app",
  messagingSenderId: "275172993103",
  appId: "1:275172993103:web:e001d6487f8429d736a23a"
};
    const app = initializeApp(bdbConfig);
    const db = getFirestore(app);

    let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth();
    let data = {}, selectedDate = "", selectedColor = "#ffdce0", memoTimer, editIndex = null, cachedHolidays = {};

    onSnapshot(doc(db, "planner", "data"), (snap) => { 
        if (snap.exists()) { data = snap.data(); renderCalendar(); } 
    });

    onSnapshot(doc(db, "planner", "memo"), (snap) => {
        const memoArea = document.getElementById('memo-area'); // 여기서 직접 찾기
        if (snap.exists() && memoArea && document.activeElement !== memoArea) { 
            memoArea.value = snap.data().text || ""; 
        }
    });
    async function fetchHolidays(year) {
        if (cachedHolidays[year]) return cachedHolidays[year];
        try {
            const res = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/KR`);
            const hData = await res.json();
            const hMap = {};
            hData.forEach(h => { const d = new Date(h.date); hMap[`${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`] = h.localName; });
            cachedHolidays[year] = hMap; return hMap;
        } catch (e) { return {}; }
    }

    async function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        document.getElementById('display-year').innerText = currentYear;
        document.getElementById('month-display').innerText = `${currentMonth + 1}월`;

        const holidays = await fetchHolidays(currentYear);
        const firstDay = new Date(currentYear, currentMonth, 1).getDay(), lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
        ['일','월','화','수','목','금','토'].forEach(d => grid.innerHTML += `<div class="day-header">${d}</div>`);
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="day"></div>`;

        const now = new Date();
        for(let d=1; d<=lastDate; d++) {
            const dateStr = `${currentYear}-${currentMonth+1}-${d}`, dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
            const userEvents = data[dateStr] || [], isUserHoliday = userEvents.find(ev => ev.isHoliday);
            let holidayName = holidays[dateStr] || (isUserHoliday ? isUserHoliday.text : '');

            let dayClass = "day";
            if (dayOfWeek === 0 || holidayName) dayClass += " sun";
            if (dayOfWeek === 6) dayClass += " sat";
            if (currentYear === now.getFullYear() && currentMonth === now.getMonth() && d === now.getDate()) dayClass += " today";

            grid.innerHTML += `<div class="${dayClass}" ondblclick="openModal('${dateStr}')">
                <span class="date-num">${d}</span>
                ${holidayName ? `<span class="holiday-label">${holidayName}</span>` : ''}
                <div class="event-container">${userEvents.filter(ev => !ev.isHoliday).map(ev => `<span class="event-tag" style="background:${ev.color || '#eee'};">${ev.text}</span>`).join('')}</div>
            </div>`;
        }
    }

    window.closeAll = () => {
        document.querySelector('.memo-container').classList.remove('active');
        document.getElementById('modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        editIndex = null;
        document.getElementById('event-input').value = ''; // [수정] 닫을 때도 초기화
        document.getElementById('is-holiday').checked = false;
    };

    window.openModal = (d) => {
        selectedDate = d;
        document.getElementById('event-input').value = ''; // [해결] 3번: 열 때 입력창 초기화
        document.getElementById('is-holiday').checked = false;
        const p = d.split('-');
        document.getElementById('modal-date-display').innerText = `${p[1]}월 ${p[2]}일`;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        window.updateModalList();
    };

    // [수정] 모달 내 일정 목록 업데이트 함수
    window.updateModalList = () => {
        const div = document.getElementById('modal-list');
        div.innerHTML = '';
        
        // 현재 날짜의 일정 가져오기 (없으면 빈 배열)
        const events = data[selectedDate] || [];
        
        // [해결] 공휴일(isHoliday: true)이 상단에 오도록 정렬
        const sortedEvents = [...events].sort((a, b) => {
            return (b.isHoliday ? 1 : 0) - (a.isHoliday ? 1 : 0);
        });

        sortedEvents.forEach((ev, i) => {
            // [해결] [공휴일] 문구 대신 🚩 아이콘 사용
            const icon = ev.isHoliday ? `<span style="color:#e53935; margin-right:5px;">🚩</span>` : '';
            
            // 실제 데이터(data[selectedDate])에서의 원래 인덱스를 찾아야 삭제가 정확함
            const originalIndex = events.indexOf(ev);

            div.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; 
                            background:${ev.isHoliday ? '#fff5f5' : (ev.color || '#eee')}; 
                            padding:8px; margin-bottom:5px; border-radius:8px; border: ${ev.isHoliday ? '1px solid #ffcdd2' : 'none'};">
                    <span onclick="prepareEdit(${originalIndex})" style="cursor:pointer; flex:1; font-weight:${ev.isHoliday ? 'bold' : 'normal'}; color:${ev.isHoliday ? '#c62828' : '#333'};">
                        ${icon}${ev.text}
                    </span>
                    <button onclick="deleteEvent(${originalIndex})" style="border:none; background:none; color:#999; cursor:pointer; font-size:18px; padding:0 5px;">&times;</button>
                </div>`;
        });

        if (sortedEvents.length === 0) {
            div.innerHTML = '<div style="text-align:center; color:#ccc; font-size:12px; padding:10px;">등록된 일정이 없습니다.</div>';
        }
    };

    window.addEvent = async () => {
        const input = document.getElementById('event-input'), isHolidayChecked = document.getElementById('is-holiday').checked;
        if (!input.value) return;

        // [해결] 2번: 공휴일 중복 저장 방지
        const holidays = await fetchHolidays(currentYear);
        const hasExistingHoliday = holidays[selectedDate] || (data[selectedDate] || []).some((ev, idx) => ev.isHoliday && idx !== editIndex);
        
        if (isHolidayChecked && hasExistingHoliday) {
            alert("이미 해당 날짜에 공휴일이 등록되어 있습니다.");
            return;
        }

        if (!data[selectedDate]) data[selectedDate] = [];
        const ev = { text: input.value, color: selectedColor, isHoliday: isHolidayChecked };
        if (editIndex !== null) data[selectedDate][editIndex] = ev;
        else data[selectedDate].push(ev);
        await setDoc(doc(db, "planner", "data"), data);
        window.closeAll();
    };

    window.deleteEvent = async (i) => { data[selectedDate].splice(i, 1); await setDoc(doc(db, "planner", "data"), data); window.updateModalList(); };
    window.prepareEdit = (i) => {
        const ev = data[selectedDate][i];
        document.getElementById('event-input').value = ev.text;
        document.getElementById('is-holiday').checked = ev.isHoliday;
        editIndex = i;
    };
    window.selectColor = (c, el) => { selectedColor = c; document.querySelectorAll('.color-btn').forEach(b => b.style.border = 'none'); el.style.border = '2px solid #333'; };
    window.changeMonth = (n) => { currentMonth += n; if (currentMonth < 0) { currentMonth = 11; currentYear--; } else if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); };
    window.goToday = () => { const n = new Date(); currentYear = n.getFullYear(); currentMonth = n.getMonth(); renderCalendar(); };
    window.toggleMemo = async function(e) { 
        if (e) e.stopPropagation(); 
        const snap = await getDoc(doc(db, "planner", "memo"));
        if (snap.exists()) document.getElementById('memo-area').value = snap.data().text || "";
        if (window.innerWidth <= 768) { 
            if (document.querySelector('.memo-container').classList.contains('active')) return;
            document.querySelector('.memo-container').classList.add('active'); 
            document.getElementById('overlay').style.display = 'block'; 
            document.getElementById('memo-area').focus();
        }
    };
    document.getElementById('memo-area').addEventListener('click', (e) => e.stopPropagation());
    document.getElementById('memo-area').addEventListener('input', (e) => {
        clearTimeout(memoTimer);
        memoTimer = setTimeout(() => setDoc(doc(db, "planner", "memo"), { text: e.target.value }), 800);
    });

window.openYearlyView = async () => {
    const container = document.getElementById('yearly-list-container'); 
    container.innerHTML = '<div style="text-align:center; padding:20px; font-size:14px;">데이터 로딩 중...</div>';
    
    document.getElementById('yearly-modal').style.display = 'flex';
    document.getElementById('overlay').style.display = 'block';

    // [핵심] 현재 달력의 연도를 기준으로 API 공휴일 호출
    const hList = await fetchHolidays(currentYear); 
    container.innerHTML = '';
    document.getElementById('yearly-title').innerText = currentYear;

    for (let m = 1; m <= 12; m++) {
        let mHtml = '';
        const lastDay = new Date(currentYear, m, 0).getDate();
        
        for(let d = 1; d <= lastDay; d++) {
            const dateStr = `${currentYear}-${m}-${d}`;
            // API 데이터 매칭용 키 (예: "1-1", "5-5")
            const apiKey = `${m}-${d}`; 
            const apiHName = hList[apiKey]; // 여기서 설날, 추석 등이 잡힙니다.
            
            const dayEvents = data[dateStr] || [];
            let combined = [];

            // 1. API 법정 공휴일 (설날, 추석 등)
            if(apiHName) {
                combined.push(`<span class="yearly-holiday-bold">[${apiHName}]</span>`);
            }

            // 2. 사용자 일정 처리 (근무 제외)
            const personal = dayEvents.filter(ev => !ev.isWork)
                                     .sort((a, b) => (a.isHoliday === b.isHoliday ? 0 : a.isHoliday ? -1 : 1));
            
            personal.forEach(ev => {
                if(ev.isHoliday) {
                    // API와 중복되지 않는 사용자 정의 공휴일만 추가
                    if(ev.text !== apiHName) {
                        combined.push(`<span class="yearly-holiday-bold">[${ev.text}]</span>`);
                    }
                } else {
                    combined.push(ev.text);
                }
            });

            if (combined.length > 0) {
                const isRed = apiHName || dayEvents.some(ev => ev.isHoliday);
                mHtml += `<div style="display:flex; padding:8px 5px; border-bottom:1px solid #f2f2f2; font-size:14px; align-items:flex-start;">
                    <span style="width:40px; font-weight:800; color:${isRed ? '#e53935' : '#555'};">${d}일</span>
                    <span style="flex:1; line-height:1.4;">${combined.join(', ')}</span>
                </div>`;
            }
        }
        if (mHtml) {
            container.innerHTML += `<div style="margin-top:15px; border-bottom:2px solid var(--pink); padding-bottom:5px; font-weight:bold; color:var(--pink); font-size:16px;">${m}월</div>` + mHtml;
        }
    }
};

window.closeYearlyView = () => {
    document.getElementById('yearly-modal').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
};

document.getElementById('overlay').addEventListener('click', () => {
    // 연간 일정 모달이 열려있으면 닫기 함수 실행
    if(document.getElementById('yearly-modal').style.display === 'flex') {
        window.closeYearlyView(); 
    }
    
    // 일반 등록/수정 모달(closeModal)이 있다면 그것도 닫기
    if(typeof closeModal === 'function') {
        closeModal();
    }
});
    
    // [추가] 모바일 터치 스와이프 기능
    let touchStartX = 0;
    let touchEndX = 0;

    const calendarGrid = document.getElementById('calendar-grid');

    calendarGrid.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    calendarGrid.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, { passive: true });

    function handleSwipe() {
        const swipeDistance = touchEndX - touchStartX;
        const threshold = 50; // 최소 스와이프 거리 (픽셀)

        if (swipeDistance < -threshold) {
            // 왼쪽으로 밀었을 때 -> 다음 달
            window.changeMonth(1);
        } else if (swipeDistance > threshold) {
            // 오른쪽으로 밀었을 때 -> 이전 달
            window.changeMonth(-1);
        }
    }

    
    renderCalendar();
</script>
</body>
</html>
