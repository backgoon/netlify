<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3040 홀브 일정</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

    :root { 
        --blue: #1a3a6d; 
        --pink: #ff85a1; 
        --soft-pink: #fff0f3; 
        --today: #fffde7; 
        --mint: #e0f2f1; 
        --sat: #1e88e5; 
        --sun: #e53935; 
    }
    
    /* 기본 설정 */
    body { 
        font-family: 'Nanum Gothic', sans-serif; 
        background: var(--soft-pink); 
        margin: 0; 
        padding: 10px; 
        overflow-x: hidden; 
        width: 100%; 
        box-sizing: border-box; 
    }

    /* 상단 헤더 영역 */
    .header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        background: white; 
        padding: 15px; 
        border-radius: 12px; 
        box-shadow: 0 4px 15px rgba(255,133,161,0.1); 
        margin-bottom: 15px; 
        border: 1px solid var(--soft-pink); 
    }
    .year-area { display: flex; align-items: center; white-space: nowrap; font-size: 28px; font-weight: 800; color: var(--blue); }
    .today-btn { padding: 5px 12px; cursor: pointer; background: white; color: var(--pink); border: 2px solid var(--pink); border-radius: 20px; font-weight: bold; font-size: 14px; margin-left: 8px; }

    /* 달력 그리드 레이아웃 */
    .calendar-card { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 8px 25px rgba(255,133,161,0.15); border: 2px solid var(--soft-pink); width: 100%; box-sizing: border-box; }
    
    .grid { 
        display: grid; 
        grid-template-columns: repeat(7, 1fr); 
        grid-auto-rows: minmax(100px, auto); 
        gap: 4px; 
        width: 100%; 
    }

    /* 요일 헤더 */
    .day-header { text-align: center; font-weight: bold; padding: 5px; color: var(--pink); font-size: 12px; }
    .day-header:nth-child(1) { color: var(--sun); }
    .day-header:nth-child(7) { color: var(--sat); }

    /* 날짜 칸 설정 */
    .day { 
        min-height: 100px; 
        background: white; 
        border: 1px solid #ffeef1; 
        border-radius: 6px; 
        padding: 6px; 
        cursor: pointer; 
        position: relative; 
        font-size: 13px; 
        display: flex; 
        flex-direction: column; 
        height: auto; 
    }
    .day.today { 
        border: 2px solid var(--pink) !important; 
        background: var(--today) !important; 
        box-shadow: inset 0 0 5px rgba(255,133,161,0.3);
    }

    .day.today .date-num {
        background: var(--pink);
        color: white !important;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
    .day.sun .date-num, 
    .day.sun .holiday-label { 
        color: var(--sun) !important; 
    }
    .day.sat .date-num { color: var(--sat); }

    .day .date-num { font-weight: bold; margin-bottom: 4px; }

    .holiday-label {
        font-size: 11px;
        font-weight: 800;
        display: block;
        margin-bottom: 3px;
        word-break: break-all;
    }

    .event-container {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        width: 100%;
        padding: 2px;
        justify-content: flex-start;
    }

    .event-tag {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
        color: #333;
        line-height: 1.4;
        max-width: 95%; 
        word-break: break-all;
        white-space: normal;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        cursor: pointer;
    }

    /* 메모장 */
    .memo-container { 
        position: relative; 
        background: #e0f2f1; 
        width: 450px; 
        height: 180px; 
        padding: 10px; 
        box-shadow: 5px 5px 15px rgba(0,0,0,0.1); 
        border-left: 10px solid #b2dfdb; 
        z-index: 100;
        cursor: text;
    }

    #memo-area { 
        width: 100%; height: 100%; 
        background: transparent; 
        border: none; 
        font-family: 'Nanum Gothic', sans-serif; 
        font-size: 16px; 
        font-weight: 800; 
        line-height: 1.8; 
        resize: none; 
        outline: none; 
        display: block; 
        color: #1a1a1a; 
        caret-color: #ff0000 !important; 
        padding: 10px; 
        box-sizing: border-box; 
        overflow-y: auto;
    }

    .nav-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
    .nav-btn { padding: 8px 16px; cursor: pointer; background: var(--pink); color: white; border: none; border-radius: 8px; font-weight: bold; }
    
    .modal { 
        display: none; position: fixed; 
        top: 50%; left: 50%; transform: translate(-50%, -50%); 
        background: white; padding: 20px; border-radius: 20px; 
        z-index: 1001; width: 280px; border: 3px solid var(--pink); 
    }
    .add-btn { width: 100%; padding: 12px; background: var(--pink); color: white; border: none; border-radius: 10px; font-weight: bold; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); z-index: 999; }

    @media (max-width: 768px) {
        .memo-container {
            position: fixed !important; top: 20px !important; right: 20px !important;
            width: 50px !important; height: 50px !important;
            border-radius: 50% !important; border: 3px solid #b2dfdb !important;
            padding: 0 !important; display: flex !important;
            justify-content: center !important; align-items: center !important;
        }
        .memo-container:not(.active)::before { content: '📝'; font-size: 24px; }
        .memo-container:not(.active) #memo-area { display: none !important; }
        .memo-container.active {
            border-radius: 15px !important; top: 50% !important; left: 50% !important;
            transform: translate(-50%, -50%) !important;
            width: 90% !important; height: 350px !important;
            z-index: 1001 !important; padding: 15px !important;
        }
        .grid { 
            grid-template-columns: repeat(7, minmax(12%, 1fr)); 
            grid-auto-rows: minmax(90px, auto); 
            gap: 1px; 
        }
        .event-tag { font-size: 8.5px; letter-spacing: -0.8px; padding: 2px 1px; }
        .holiday-label { font-size: 9px; }
    }
</style>
</head>
<body>
    <div class="header">
        <div class="year-area">
            <span id="display-year"></span>년
            <button class="today-btn" onclick="goToday()">오늘</button>
        </div>
        <div class="memo-container" onclick="toggleMemo(event)">
            <textarea id="memo-area" placeholder="메모를 입력하세요..."></textarea>
        </div>
    </div>

    <div class="nav-control">
        <button class="nav-btn" onclick="changeMonth(-1)">◀ 이전달</button>
        <span id="month-display" style="font-size: 20px; font-weight: bold; color: var(--blue);"></span>
        <button class="nav-btn" onclick="changeMonth(1)">다음달 ▶</button>
    </div>

    <div class="calendar-card">
        <div class="grid" id="calendar-grid"></div>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <div id="modal" class="modal">
        <h3 id="modal-date-display" style="text-align: center; color: #333; margin-bottom: 20px;"></h3>
        <div style="font-size: 13px; color: #555; margin-bottom: 8px; font-weight: bold;">📅 등록된 일정</div>
        <div id="modal-list" style="margin-bottom:20px; max-height:180px; overflow-y:auto; border: 1px solid #ddd; padding: 10px; border-radius: 12px; background: #fafafa;"></div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="event-input" placeholder="일정 내용을 입력하세요" style="width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box;">
            <div style="display: flex; gap: 12px; justify-content: center; margin: 10px 0;">
                <div class="color-btn" onclick="selectColor('#ffdce0', this)" style="background:#ffdce0; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
                <div class="color-btn" onclick="selectColor('#e2f0cb', this)" style="background:#e2f0cb; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
                <div class="color-btn" onclick="selectColor('#c7ceea', this)" style="background:#c7ceea; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
                <div class="color-btn" onclick="selectColor('#f7d1ba', this)" style="background:#f7d1ba; width:30px; height:30px; border-radius:50%; cursor:pointer;"></div>
            </div>
            <div style="display: flex; align-items: center; gap: 8px; background: #fff4f4; padding: 8px; border-radius: 8px;">
                <input type="checkbox" id="is-holiday" style="width:18px; height:18px;">
                <label for="is-holiday" style="color: #e53935; font-weight: bold; font-size: 13px;">이 일정을 공휴일(빨간날)로 지정</label>
            </div>
            <button class="add-btn" onclick="addEvent()" style="background: #333;">추가 / 수정 저장</button>
        </div>
        <button onclick="closeAll()" style="width:100%; margin-top:15px; border:none; background:transparent; color: #999; cursor:pointer;">취소하고 닫기</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjKNiwIuWn1-MhAgsIRz1C5FCa7NTy_5o",
        authDomain: "backgoon-811dc.firebaseapp.com",
        projectId: "backgoon-811dc",
        storageBucket: "backgoon-811dc.firebasestorage.app",
        messagingSenderId: "275172993103",
        appId: "1:275172993103:web:e001d6487f8429d736a23a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let data = {}, selectedDate = "", selectedColor = "#ffdce0", memoTimer, editIndex = null;

    const memoArea = document.getElementById('memo-area');
    const memoContainer = document.querySelector('.memo-container');
    const overlay = document.getElementById('overlay');

    // [1] 실시간 감시
    onSnapshot(doc(db, "planner", "data"), (snap) => {
        if (snap.exists()) { data = snap.data(); renderCalendar(); }
    });
    onSnapshot(doc(db, "planner", "memo"), (snap) => {
        if (snap.exists() && document.activeElement !== memoArea) {
            memoArea.value = snap.data().text || "";
        }
    });

    // [2] 공휴일 API
    let cachedHolidays = {};
    async function fetchHolidays(year) {
        if (cachedHolidays[year]) return cachedHolidays[year];
        try {
            const response = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/KR`);
            const hData = await response.json();
            const hMap = {};
            hData.forEach(h => {
                const d = new Date(h.date);
                hMap[`${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`] = h.localName;
            });
            cachedHolidays[year] = hMap;
            return hMap;
        } catch (e) { return {}; }
    }

    // [3] 달력 렌더링
    async function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        document.getElementById('display-year').innerText = currentYear;
        document.getElementById('month-display').innerText = `${currentMonth + 1}월`;

        const holidays = await fetchHolidays(currentYear);
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();

        ['일','월','화','수','목','금','토'].forEach(d => grid.innerHTML += `<div class="day-header">${d}</div>`);
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="day"></div>`;

        const now = new Date();
        for(let d=1; d<=lastDate; d++) {
            const dateStr = `${currentYear}-${currentMonth+1}-${d}`;
            const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
            const userEvents = data[dateStr] || [];
            const isUserHoliday = userEvents.find(ev => ev.isHoliday);
            let holidayName = holidays[dateStr] || (isUserHoliday ? isUserHoliday.text : '');

            let dayClass = "day";
            if (dayOfWeek === 0 || holidayName) dayClass += " sun";
            if (dayOfWeek === 6) dayClass += " sat";
            if (currentYear === now.getFullYear() && currentMonth === now.getMonth() && d === now.getDate()) dayClass += " today";

            grid.innerHTML += `
                <div class="${dayClass}" ondblclick="openModal('${dateStr}')">
                    <span class="date-num">${d}</span>
                    ${holidayName ? `<span class="holiday-label">${holidayName}</span>` : ''}
                    <div class="event-container">${userEvents.filter(ev => !ev.isHoliday).map(ev => `<span class="event-tag" style="background:${ev.color || '#eee'};">${ev.text}</span>`).join('')}</div>
                </div>`;
        }
    }

    // [4] 통합 함수 (전역 등록)
    window.closeAll = () => {
        if (memoContainer) memoContainer.classList.remove('active');
        document.getElementById('modal').style.display = 'none';
        overlay.style.display = 'none';
        editIndex = null;
    };

    window.toggleMemo = async function(e) {
        if (e) e.stopPropagation();
        const isMobile = window.innerWidth <= 768;

        // 즉시 데이터 업데이트
        const snap = await getDoc(doc(db, "planner", "memo"));
        if (snap.exists()) memoArea.value = snap.data().text || "";

        if (isMobile) {
            if (memoContainer.classList.contains('active')) return;
            memoContainer.classList.add('active');
            overlay.style.display = 'block';
            memoArea.focus();
        }
    };

    window.changeMonth = (n) => {
        currentMonth += n;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        renderCalendar();
    };

    window.goToday = () => {
        const n = new Date(); currentYear = n.getFullYear(); currentMonth = n.getMonth();
        renderCalendar();
    };

    window.openModal = (d) => {
        selectedDate = d;
        const p = d.split('-');
        document.getElementById('modal-date-display').innerText = `${p[1]}월 ${p[2]}일`;
        document.getElementById('modal').style.display = 'block';
        overlay.style.display = 'block';
        window.updateModalList();
    };

    window.updateModalList = () => {
        const div = document.getElementById('modal-list');
        div.innerHTML = '';
        (data[selectedDate] || []).forEach((ev, i) => {
            div.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; background:${ev.isHoliday ? '#fff5f5' : (ev.color || '#eee')}; padding:8px; margin-bottom:5px; border-radius:8px;">
                <span onclick="prepareEdit(${i})" style="cursor:pointer; flex:1;">${ev.text}</span>
                <button onclick="deleteEvent(${i})" style="border:none; background:none; color:red; cursor:pointer;">×</button></div>`;
        });
    };

    window.addEvent = async () => {
        const input = document.getElementById('event-input');
        if (!input.value) return;
        if (!data[selectedDate]) data[selectedDate] = [];
        const ev = { text: input.value, color: selectedColor, isHoliday: document.getElementById('is-holiday').checked };
        if (editIndex !== null) data[selectedDate][editIndex] = ev;
        else data[selectedDate].push(ev);
        await setDoc(doc(db, "planner", "data"), data);
        window.closeAll();
    };

    window.deleteEvent = async (i) => {
        data[selectedDate].splice(i, 1);
        await setDoc(doc(db, "planner", "data"), data);
        window.updateModalList();
    };

    window.prepareEdit = (i) => {
        const ev = data[selectedDate][i];
        document.getElementById('event-input').value = ev.text;
        document.getElementById('is-holiday').checked = ev.isHoliday;
        editIndex = i;
    };

    window.selectColor = (c, el) => {
        selectedColor = c;
        document.querySelectorAll('.color-btn').forEach(b => b.style.border = 'none');
        el.style.border = '2px solid #333';
    };

    // [5] 이벤트 리스너 (수정 시 닫힘 방지)
    memoArea.addEventListener('click', (e) => e.stopPropagation());
    memoArea.addEventListener('input', (e) => {
        clearTimeout(memoTimer);
        memoTimer = setTimeout(() => setDoc(doc(db, "planner", "memo"), { text: e.target.value }), 800);
    });

    renderCalendar();
</script>
</body>
</html>
